---
layout: default
---
<article class="blog-page">
  <div class="blog-page__inner blog-page__inner--narrow">
    <span class="section__kicker">News Article</span>
    <h1 class="section__title" style="margin-top: 0.5rem;">{{ page.title }}</h1>
    {% if page.date %}
    <p class="blog-item__date" style="margin-bottom: 2rem;">{{ page.date | date: "%B %d, %Y" }}</p>
    {% endif %}
    {% if page.illustration %}
    <img src="{{ page.illustration }}" alt="{{ page.title }}" class="post-illustration">
    {% endif %}
    <div class="blog-content">
      {{ content }}
    </div>
  </div>
</article>
