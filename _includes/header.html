<div class="site-brand-bar" aria-hidden="true"></div>
<header id="nav-header" class="site-header">
  <div class="site-header__inner">
    <a href="/" class="site-header__logo">
      <img src="/assets/iso-red.svg" alt="ISO">
      <div class="site-header__brand">
        <span class="site-header__logo-text">ISO/TC 211</span>
        <span class="site-header__logo-sub">Harmonized Resources Maintenance Agency</span>
      </div>
    </a>

    <div class="site-header__actions">
      <nav class="site-header__nav">
        <a href="/about/" class="site-header__link">About</a>
        <a href="/posts/" class="site-header__link">Blog</a>
      </nav>
      <a href="https://committee.iso.org/home/tc211" class="site-header__link" target="_blank" rel="noopener">
        Committee Site
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6m0 0v6m0-6L10 14"/></svg>
      </a>
      <button id="theme-toggle" type="button" class="site-header__icon-btn" aria-label="Toggle dark mode">
        {% include icons/sun.html %}
        {% include icons/moon.html %}
      </button>
    </div>
  </div>
</header>

<script>
  document.getElementById('theme-toggle').addEventListener('click', function() {
    if (window.__theme) window.__theme.toggle();
  });
</script>
